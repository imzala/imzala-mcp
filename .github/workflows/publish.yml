name: Publish to npm

# Bir sürüm etiketi (v1.2.0 gibi) push edilince otomatik npm publish yapar.
# Kurulum:
#   1. npmjs.com'da granular/automation token oluştur (read-write @imzala, bypass 2FA)
#   2. GitHub repo > Settings > Secrets and variables > Actions > New repository secret:
#        NPM_PUBLISH_TOKEN = npm_...
#   3. Yayınla:
#        npm version patch    # package.json'u bump + v1.2.1 tag oluşturur
#        git push && git push --tags
#      (ya da elle: git tag v1.2.1 && git push origin v1.2.1)
#   -> Bu workflow tag'i yakalar, build+test eder, tag==package.json doğrular, publish eder.
#      Elle OTP girmeye gerek YOK (token 2FA bypass eder).

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      # Secret ekli DEĞİLSE boş string olur → aşağıdaki e2e adımı `if` ile atlanır
      # (fail-closed değil, graceful). Eklenirse e2e gate koşar.
      E2E_API_KEY: ${{ secrets.IMZALA_E2E_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Tag == package.json version guard
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG package.json=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Etiket ($TAG) package.json sürümüyle ($PKG) uyuşmuyor. 'npm version' kullan."
            exit 1
          fi

      # e2e gate: gerçek built server'ı test-api'ye karşı sürer, read tool'ların
      # çıktısını assert eder (eser_tescil DOA sınıfı bug'ı yakalar). GRACEFUL —
      # IMZALA_E2E_API_KEY secret'ı EKLİYSE koşar, EKLİ DEĞİLSE atlanır (publish
      # kırılmaz). Secret = test ortamı salt-okunur anahtar (timestamps + *:read).
      - name: E2E gate (yalnız IMZALA_E2E_API_KEY secret'ı ekliyse)
        if: ${{ env.E2E_API_KEY != '' }}
        run: npm run e2e
        env:
          IMZALA_E2E_API_KEY: ${{ env.E2E_API_KEY }}
          IMZALA_E2E_BASE_URL: https://test-api.imzala.org
          IMZALA_E2E_SKIP_TIMESTAMP: '1'
          # opsiyonel: sozlesme_durumu + imzali_pdf_indir'e gerçek hedef (yoksa atlanır)
          IMZALA_E2E_DEMAND_ID: ${{ secrets.IMZALA_E2E_DEMAND_ID }}
          IMZALA_E2E_COMPLETED_DEMAND_ID: ${{ secrets.IMZALA_E2E_COMPLETED_DEMAND_ID }}

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
          # e2e yukarıda (secret varsa) koştu + build/test explicit adımlarda çalıştı;
          # prepublishOnly'nin e2e'yi tekrar koşmasını engelle (aksi halde secret
          # yokken fail-closed olurdu). Publish yine build+test'i tekrar koşar (hızlı).
          IMZALA_E2E_SKIP: '1'
